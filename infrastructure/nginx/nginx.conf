# ==========================================
# IDENTITY: The Bouncer / Reverse Proxy
# FILEPATH: infrastructure/nginx/nginx.conf
# COMPONENT: Web Server / Traffic Cop
# ROLE: Sits in front of FastAPI. Blocks the opps.
# VIBE: "You're not on the guest list, buddy." 🛑
# ==========================================

events {
    worker_connections 1024;
}

http {
    upstream orbit_backend {
        # Points to our FastAPI Docker container
        server orbit-core:8000;
    }

    server {
        listen 80;
        server_name orbit.local; # Change this when you deploy to a real VPS

        # Route API traffic to the FastAPI brain
        location /api/ {
            proxy_pass http://orbit_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Route WebSocket traffic (The Blast Protocol)
        location /ws/ {
            proxy_pass http://orbit_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            # Don't let the connection timeout like a bad trade
            proxy_read_timeout 86400; 
        }

        # Reject everything else (Anti-snoop protection)
        location / {
            return 404;
        }
    }
}