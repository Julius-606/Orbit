################################################################################
# FILE: .github/workflows/hf-sync.yml
# VERSION: 1.0.0 | SYSTEM: Hugging Face CI/CD Bot
################################################################################
#
# HOW IT WORKS:
# This acts as an automated "Expert Advisor" (EA). 
# Every time you push code to the 'main' branch, it checks if the 'backend' folder changed.
# If yes, it creates a temporary git repo inside the 'backend' folder and force-pushes
# ONLY that folder to Hugging Face Spaces. Zero drawdown deployment! 🚀

name: Sync Backend to Hugging Face Space

on:
  push:
    branches: [ "main" ]
    # Optional: Only run this workflow if something in the backend actually changed
    paths:
      - 'backend/**'
  
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Fetch all history for all branches and tags

      - name: Push ONLY Backend to HF Spaces
        env:
          # We will set this secret up in GitHub next
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          
          # ⚠️ EDIT THESE VARIABLES BEFORE PUSHING ⚠️
          HF_USERNAME: "YourHuggingFaceUsername"
          HF_SPACE_NAME: "orbit-brain"
        run: |
          echo "🪐 Booting up the Orbit Deployment EA..."
          
          # Move into the backend folder so it becomes the "root"
          cd backend
          
          # Initialize a fresh, temporary git repository just for this deployment
          git init
          git config user.name "Orbit Automations"
          git config user.email "bot@orbit.local"
          
          # Stage all backend files (including the Dockerfile and README.md)
          git add .
          git commit -m "Auto-sync from Julius-606/Orbit monorepo"
          
          # Force push to the Hugging Face Space
          # This completely overwrites the HF Space with ONLY the backend files
          git push --force https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/$HF_SPACE_NAME master:main
          
          echo "📈 Take Profit Hit! Backend deployed successfully to Hugging Face."
